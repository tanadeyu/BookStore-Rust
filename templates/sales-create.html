<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>販売登録 | BookStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #E9ECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #495057;
            --border: #ADB5BD;
            --accent: #343A40;
            --accent-hover: #212529;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 48px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .nav {
            padding: 0;
            margin: 0 0 32px 0;
            display: flex;
            gap: 6px;
        }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .nav a:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
            background: var(--bg-primary);
            transition: all 0.2s ease;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 58, 64, 0.1);
        }
        .item-row {
            background: var(--bg-secondary);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .item-row .form-row {
            margin-bottom: 16px;
        }
        .btn {
            padding: 12px 24px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 4px;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border);
        }
        .btn-back {
            text-decoration: none;
            display: inline-block;
        }
        .btn-submit {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }
        .btn-submit:hover {
            background: #495057;
            color: var(--bg-primary);
            border-color: #495057;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/sales">戻る</a>
        </div>
        <h1>新規販売登録</h1>

        <form action="/sales/create" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>販売日</label>
                    <input type="date" name="saleDate" required>
                </div>
                <div class="form-group">
                    <label>顧客</label>
                    <select name="customerId" required>
                        <option value="">選択してください</option>
                        {% for customer in customers %}
                        <option value="{{ customer.id }}">{{ customer.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="item-row">
                <div class="form-row">
                    <div class="form-group">
                        <label>商品1</label>
                        <select name="productId1">
                            <option value="0">（選択しない）</option>
                            {% for product in products %}
                            <option value="{{ product.id }}">{{ product.name }} ({{ product.price.unwrap_or(0) }}円)</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>数量</label>
                        <input type="number" name="quantity1" min="0" value="0" placeholder="数量">
                    </div>
                </div>
            </div>

            <div class="item-row">
                <div class="form-row">
                    <div class="form-group">
                        <label>商品2</label>
                        <select name="productId2">
                            <option value="0">（選択しない）</option>
                            {% for product in products %}
                            <option value="{{ product.id }}">{{ product.name }} ({{ product.price.unwrap_or(0) }}円)</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>数量</label>
                        <input type="number" name="quantity2" min="0" value="0" placeholder="数量">
                    </div>
                </div>
            </div>

            <div class="item-row">
                <div class="form-row">
                    <div class="form-group">
                        <label>商品3</label>
                        <select name="productId3">
                            <option value="0">（選択しない）</option>
                            {% for product in products %}
                            <option value="{{ product.id }}">{{ product.name }} ({{ product.price.unwrap_or(0) }}円)</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>数量</label>
                        <input type="number" name="quantity3" min="0" value="0" placeholder="数量">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <button type="submit" class="btn btn-submit">登録</button>
                </div>
                <div class="form-group">
                    <a href="/sales" class="btn btn-back">キャンセル</a>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
